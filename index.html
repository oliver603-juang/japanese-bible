<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="聖經特訓">
<meta name="theme-color" content="#1E1E24">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="64x64" href="icon-64.png">
<title>日文聖經特訓班</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1E1E24;--surface:#2A2B2E;--border:#3A3B3E;--text:#F0EBE1;--text-dim:#A09D96;--text-muted:#6B6860;--tile-noun:#8FA88B;--tile-verb:#7B9DAB;--tile-particle:#C4877A;--tile-adj:#C9B88C;--tile-other:#A8A49B;--accent:#C4877A;--gold:#C9B88C;--stroke:#3C4043;--gap:4px;--radius:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','M PLUS Rounded 1c',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none;-webkit-user-select:none;}
.hidden{display:none!important;}
.top-bar{display:flex;align-items:center;padding:6px 12px;gap:6px;flex-shrink:0;}
.app-logo{font-size:0.85rem;font-weight:900;color:var(--gold);flex:1;}
.gear-btn{width:28px;height:28px;border:none;border-radius:50%;background:var(--surface);color:var(--text-dim);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.api-badge{font-size:0.5rem;color:var(--text-muted);background:var(--surface);padding:2px 7px;border-radius:10px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);transition:all 0.3s;line-height:1.3;text-align:center;}
.api-badge.ok{color:var(--tile-noun);border-color:rgba(143,168,139,0.4);}
.api-badge.warn{color:var(--gold);border-color:rgba(201,184,140,0.4);}
.api-badge.err{color:var(--accent);border-color:rgba(196,135,122,0.4);}
.chunk-blurred .chunk-char,.chunk-blurred .furigana{filter:blur(8px);transition:filter 0.3s;user-select:none;}
.chunk-blurred:hover .chunk-char,.chunk-blurred:hover .furigana{filter:blur(4px);}
.chunk-blurred.peek .chunk-char,.chunk-blurred.peek .furigana{filter:none;}
.voice-hint-btn{padding:3px 7px;border:none;border-radius:6px;font-size:0.55rem;font-weight:700;cursor:pointer;background:var(--tile-verb);color:#3C4043;transition:transform 0.1s;}
.voice-hint-btn:active{transform:scale(0.9);}
.nav-row{display:flex;gap:4px;padding:2px 12px 4px;flex-shrink:0;align-items:center;}
.nav-select{padding:3px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:0.6rem;font-family:inherit;outline:none;max-width:35%;}
.testament-btn{padding:4px 8px;border:none;font-size:0.6rem;font-weight:700;cursor:pointer;font-family:inherit;}
.testament-btn.active{background:var(--accent);color:var(--text);}
.testament-btn.inactive{background:var(--surface);color:var(--text-muted);}
.verse-scroll{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;flex:1;}
.verse-scroll::-webkit-scrollbar{display:none;}
.verse-pill{padding:3px 7px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text-muted);font-size:0.55rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.verse-pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.verse-pill.cached{border-color:var(--tile-noun);color:var(--tile-noun);}
.loading-bar{height:2px;background:var(--surface);flex-shrink:0;overflow:hidden;}
.loading-bar.active .loading-fill{animation:loadSlide 1.5s infinite;}
.loading-fill{height:100%;width:30%;background:var(--gold);}
@keyframes loadSlide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.metro-grid{flex:1;display:grid;grid-template-columns:1fr;grid-template-rows:auto 1fr auto;gap:var(--gap);padding:var(--gap) 8px;overflow:hidden;min-height:0;}
.tile{border-radius:var(--radius);padding:10px;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform 0.1s;}
.tile:active{transform:scale(0.97);}
.t-listen:active,.t-write:active,.t-bonus:active{transform:none;}
.t-listen button:active{transform:scale(0.85);transition:transform 0.1s;}
.t-listen{background:var(--tile-verb);padding:6px 10px;}
.t-write{background:var(--tile-noun);min-height:0;flex:1;}
.t-bonus{background:var(--surface);border:1px solid var(--border);cursor:pointer;}
.listen-sentence{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;font-size:clamp(0.85rem,3.2vw,1.2rem);font-weight:900;line-height:1.5;display:flex;flex-wrap:wrap;gap:1px;align-items:baseline;}
.chunk-wrap{display:inline-flex;align-items:baseline;padding:1px 2px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.chunk-wrap.has-grammar{border-bottom:1.5px dashed rgba(60,64,67,0.3);}
.chunk-wrap:active{background:rgba(255,255,255,0.15);}
.chunk-ruby{display:inline-flex;flex-direction:column;align-items:center;line-height:1;}
.chunk-ruby .furigana{font-size:0.35em;color:rgba(60,64,67,0.5);margin-bottom:1px;}
.chunk-char{color:var(--stroke);}
.color-noun-green{color:#2D5A3D!important;}.color-verb-blue{color:#2A4A5A!important;}.color-particle-red{color:#6A3A34!important;}
.speak-result{font-size:0.5rem;color:rgba(60,64,67,0.5);text-align:right;min-height:12px;margin-top:1px;}
.speak-result.ok{color:#2D5A3D;font-weight:700;}.speak-result.ng{color:#6A3A34;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto;color:var(--text);}
.modal h2{font-size:1rem;margin-bottom:12px;}
.modal label{font-size:0.75rem;color:var(--text-dim);display:block;margin-bottom:4px;}
.modal input[type="password"]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:0.85rem;outline:none;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.modal-btn{padding:8px 18px;border:none;border-radius:14px;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;}
.modal-btn.save{background:var(--accent);color:var(--text);}
.modal-btn.cancel{background:var(--surface);color:var(--text-dim);}
.gm{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;user-select:text;-webkit-user-select:text;}
.gm .gm-title{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:12px;}
.gm .gm-body{font-size:0.82rem;color:var(--text);line-height:1.8;padding:14px;background:var(--surface);border-radius:12px;margin-bottom:10px;text-align:left;}
.gm .gm-body b{color:var(--gold);}
.gm .gm-close{padding:8px 24px;border:none;border-radius:16px;background:var(--gold);color:var(--bg);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;}
.score-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--surface);border:2px solid var(--gold);padding:20px 30px;border-radius:20px;text-align:center;z-index:20000;}
.score-popup.show{animation:popScale 0.5s forwards;}
@keyframes popScale{0%{transform:translate(-50%,-50%) scale(0)}80%{transform:translate(-50%,-50%) scale(1.08)}100%{transform:translate(-50%,-50%) scale(1)}}
.score-val{font-size:2.5rem;font-weight:900;color:var(--gold);}
.score-desc{font-size:0.9rem;color:var(--text-dim);margin-top:4px;}
.ocr-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:20000;padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;gap:10px;font-size:1rem;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.bottom-bar{display:flex;padding:4px 12px;gap:8px;align-items:center;flex-shrink:0;}
.progress-bar{flex:1;height:3px;background:var(--surface);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);transition:width 0.5s;}
.progress-label{font-size:0.55rem;color:var(--text-muted);white-space:nowrap;}
/* ═══ AI Grammar Teacher v2 ═══ */
.gm{padding:18px;}
.gm .gm-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:10px;}
.gm-mastery-badge{margin-left:auto;font-size:0.55rem;color:var(--gold);background:rgba(201,184,140,0.12);padding:3px 8px;border-radius:8px;font-weight:700;white-space:nowrap;border:1px solid rgba(201,184,140,0.3);}
.gm-badge{display:inline-block;padding:4px 10px;border-radius:10px;font-size:0.62rem;font-weight:700;margin-bottom:12px;letter-spacing:0.3px;}
.gm-badge.kind-particle{background:rgba(196,135,122,0.18);color:#E0A89B;border:1px solid rgba(196,135,122,0.4);}
.gm-badge.kind-word-order{background:rgba(123,157,171,0.18);color:#9CBCCB;border:1px solid rgba(123,157,171,0.4);}
.gm-badge.kind-verb-tense{background:rgba(143,168,139,0.18);color:#AECBA9;border:1px solid rgba(143,168,139,0.4);}
.gm-badge.kind-vocabulary{background:rgba(201,184,140,0.18);color:#E0CFA5;border:1px solid rgba(201,184,140,0.4);}
.gm-badge.kind-other{background:rgba(168,164,155,0.18);color:#C8C4BB;border:1px solid rgba(168,164,155,0.4);}
.gm-section{margin-bottom:12px;}
.gm-section-label{font-size:0.6rem;color:var(--text-muted);font-weight:700;letter-spacing:0.6px;margin-bottom:6px;}
.gm-metaphor{background:rgba(201,184,140,0.08);border-left:3px solid var(--gold);padding:10px 12px;border-radius:0 8px 8px 0;font-size:0.82rem;line-height:1.6;color:var(--text);margin-bottom:12px;}
.gm-compare{background:var(--surface);border-radius:10px;padding:10px 12px;margin-bottom:12px;border:1px solid var(--border);}
.gm-compare-row{display:flex;align-items:flex-start;gap:8px;font-size:0.78rem;line-height:1.5;}
.gm-compare-row+.gm-compare-row{margin-top:6px;padding-top:6px;border-top:1px dashed rgba(255,255,255,0.06);}
.gm-compare-flag{flex-shrink:0;font-size:0.85rem;width:18px;}
.gm-compare-text{flex:1;color:var(--text);}
.gm-compare-note{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:0.7rem;color:var(--gold);font-style:italic;line-height:1.5;}
.gm-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.gm-step{display:flex;align-items:flex-start;gap:10px;font-size:0.78rem;line-height:1.5;background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
.gm-step-num{flex-shrink:0;width:22px;height:22px;background:var(--gold);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;}
.gm-step-text{flex:1;padding-top:2px;color:var(--text);}
.gm-examples{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.gm-example{background:rgba(143,168,139,0.08);border:1px solid rgba(143,168,139,0.25);border-radius:8px;padding:8px 10px;}
.gm-example-jp{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;font-size:0.85rem;color:var(--text);font-weight:700;line-height:1.4;}
.gm-example-cn{font-size:0.7rem;color:var(--text-dim);margin-top:3px;}
.gm-trap{background:rgba(196,135,122,0.12);border:1px solid rgba(196,135,122,0.35);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:0.75rem;line-height:1.6;color:#E0A89B;}
.gm-trap b{color:#F0B5A6;}
.gm-quiz{background:rgba(123,157,171,0.08);border:1px solid rgba(123,157,171,0.25);border-radius:10px;padding:12px;margin-bottom:12px;}
.gm-quiz-q{font-size:0.78rem;color:var(--text);font-weight:700;margin-bottom:10px;line-height:1.5;}
.gm-quiz-opt{display:block;width:100%;text-align:left;padding:9px 11px;margin-bottom:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:0.78rem;font-family:inherit;cursor:pointer;transition:all 0.2s;line-height:1.4;}
.gm-quiz-opt:active{transform:scale(0.98);}
.gm-quiz-opt:disabled{cursor:default;}
.gm-quiz-opt.correct{background:rgba(143,168,139,0.22);border-color:#8FA88B;color:#AECBA9;font-weight:700;}
.gm-quiz-opt.wrong{background:rgba(196,135,122,0.18);border-color:#C4877A;color:#E0A89B;}
.gm-quiz-explain{margin-top:8px;padding:9px 11px;background:rgba(201,184,140,0.1);border-radius:8px;font-size:0.72rem;line-height:1.55;color:var(--gold);}
.gm-quiz-explain b{color:#F0E2B8;}
.gm-related{display:flex;flex-direction:column;gap:5px;}
.gm-related-link{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:0.7rem;cursor:pointer;text-align:left;font-family:inherit;width:100%;}
.gm-related-link:active{background:var(--border);color:var(--text);}
.gm-related-ref{font-weight:700;color:var(--gold);flex-shrink:0;font-size:0.65rem;}
.gm-related-snip{flex:1;font-size:0.65rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;}
.gm-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.gm-reanalyze{padding:8px 14px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--text-dim);font-family:inherit;font-size:0.7rem;font-weight:600;cursor:pointer;}
.gm-reanalyze:disabled{opacity:0.5;cursor:wait;}
.mastery-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.mastery-chip{padding:4px 9px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:0.6rem;color:var(--text-dim);}
.mastery-chip b{color:var(--gold);font-weight:900;margin-left:2px;}
.mastery-chip.total{background:rgba(201,184,140,0.1);border-color:rgba(201,184,140,0.35);color:var(--gold);}
.mastery-empty{font-size:0.62rem;color:var(--text-muted);line-height:1.5;}
</style>
</head>
<body>
<div class="modal-overlay" id="settings-modal"><div class="modal">
<h2>⚙️ 設定</h2>
<div style="margin-bottom:14px;"><label>🧠 Gemini API Key（文法分析＋手寫辨識＋舊約經文）</label><input type="password" id="gemini-key-input" placeholder="AIza..."><div style="font-size:0.6rem;color:var(--text-muted);margin-top:3px;">免費申請：<a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">Google AI Studio</a>（每日 1500 次）</div>
<div style="font-size:0.6rem;color:var(--text-muted);margin-top:6px;display:flex;align-items:center;gap:6px;">🤖 目前模型：<span id="current-model" style="color:var(--gold);font-family:monospace;">—</span><button onclick="resetModel()" style="margin-left:auto;padding:2px 8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:6px;font-size:0.55rem;font-family:inherit;cursor:pointer;">重設為 2.5</button></div></div>
<div style="padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);margin-bottom:14px;">
<label>🧹 維護工具</label>
<div style="display:flex;gap:6px;margin-top:6px;">
<button class="modal-btn cancel" onclick="clearCacheReload()" style="flex:1;text-align:center;font-size:0.7rem;">🔄 清除快取</button>
<button class="modal-btn cancel" onclick="resetProgress()" style="flex:1;text-align:center;font-size:0.7rem;">🗑️ 重設進度</button>
</div>
<div style="margin-top:6px;"><button class="modal-btn cancel" onclick="clearGrammarCache()" style="width:100%;text-align:center;font-size:0.7rem;">🧹 清除文法快取 (<span id="cache-count">0</span> 筆)</button></div>
</div>
<div style="padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);margin-bottom:14px;">
<label>📊 掌握進度</label>
<div id="mastery-summary" class="mastery-list"><span class="mastery-empty">點擊文法卡片中的練習題開始累積！</span></div>
<div style="margin-top:8px;"><button class="modal-btn cancel" onclick="clearMastery()" style="width:100%;text-align:center;font-size:0.65rem;">🗑️ 清除掌握紀錄</button></div>
</div>
<div style="padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);margin-bottom:14px;">
<label>💾 經文快取 匯出/匯入</label>
<div style="font-size:0.6rem;color:var(--text-muted);margin-bottom:8px;line-height:1.5;">匯出已分析的經文 JSON，可在其他裝置匯入。先到先贏：匯入時不覆蓋已有的經文。</div>
<div id="export-stats" style="font-size:0.55rem;color:var(--gold);margin-bottom:6px;"></div>
<div style="display:flex;gap:6px;">
<button class="modal-btn cancel" onclick="exportCache()" style="flex:1;text-align:center;font-size:0.65rem;">📤 匯出 JSON</button>
<label class="modal-btn cancel" style="flex:1;text-align:center;font-size:0.65rem;cursor:pointer;">📥 匯入 JSON<input type="file" accept=".json" onchange="importCache(event)" style="display:none;"></label>
</div>
</div>
<div style="padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);margin-bottom:14px;">
<label>☁️ Google Drive 雲端同步</label>
<div style="font-size:0.6rem;color:var(--text-muted);margin-bottom:8px;line-height:1.5;">登入 Google 帳號，自動跨裝置同步經文快取。按章存檔（1,189 章），先到先贏不覆蓋。</div>
<div id="drive-status" style="font-size:0.55rem;color:var(--gold);margin-bottom:6px;"></div>
<div style="display:flex;gap:6px;">
<button id="drive-login-btn" class="modal-btn cancel" onclick="driveLogin()" style="flex:1;text-align:center;font-size:0.65rem;">🔑 登入 Google</button>
<button id="drive-sync-btn" class="modal-btn cancel" onclick="driveFullSync()" style="flex:1;text-align:center;font-size:0.65rem;" disabled>🔄 同步</button>
</div>
<div style="margin-top:6px;">
<button id="drive-logout-btn" class="modal-btn cancel" onclick="driveLogout()" style="width:100%;text-align:center;font-size:0.6rem;display:none;">🚪 登出 Google Drive</button>
</div>
</div>
<div class="modal-btns"><button class="modal-btn cancel" onclick="closeSettings()">取消</button><button class="modal-btn save" onclick="saveSettings()">✅ 儲存</button></div>
</div></div>
<div class="modal-overlay" id="grammar-modal"><div class="gm">
<div class="gm-title" id="gm-title"></div>
<div class="gm-body" id="gm-body"></div>
<div id="gm-warning" style="display:none;font-size:0.75rem;color:var(--accent);background:rgba(196,135,122,0.1);padding:10px;border-radius:8px;margin-bottom:10px;line-height:1.6;"></div>
<div class="gm-actions"><button class="gm-close" onclick="document.getElementById('grammar-modal').classList.remove('open')">知道了！</button></div>
</div></div>
<div class="modal-overlay" id="bonus-modal"><div class="gm">
<div class="gm-title" id="bm-title"></div>
<div class="gm-body" id="bm-body"></div>
<div style="text-align:center;"><button class="gm-close" onclick="document.getElementById('bonus-modal').classList.remove('open')">知道了！</button></div>
</div></div>
<div class="top-bar">
<div class="app-logo">✝️ 日文聖經特訓班</div>
<div class="api-badge" id="api-badge" onclick="showApiStatus()" title="API 配額狀態">—</div>
<button class="gear-btn" onclick="openSettings()">⚙️</button>
</div>
<div class="nav-row">
<button id="btn-ot" class="testament-btn inactive" style="border-radius:6px 0 0 6px;" onclick="switchTestament('OT')">舊約</button>
<button id="btn-nt" class="testament-btn active" style="border-radius:0 6px 6px 0;" onclick="switchTestament('NT')">新約</button>

const GRAMMAR_PROMPT=`你是精通日文與繁體中文（台灣慣用語）的聖經語言導師，針對台灣初學者拆解日文聖經經文。輸出純 JSON，無任何前後文字、無 markdown 圍欄。

【三大文法鐵則（必須貫徹於每個 chunk 解說）】
1. 語序倒裝（積木理論）：日文 SOV → 動詞永遠在句尾。中文 SVO → 跳到句尾找動詞，中間都是補充積木。
2. 助詞（萬能雙面膠）：は=主角探照燈（已知話題）｜が=新角色登場（新資訊）｜を=受詞標記｜に=目標圖釘（時間/地點/對象）｜と=牽手助詞（和）｜で=舞台助詞（在哪/用什麼）｜の=所有格黏膠
3. 動詞時態（變身系統）：原形→過去式（ある→あった）｜否定（ない→なかった）｜進行（ている）｜被動（られる）

【JSON 結構（嚴格遵守欄位名）】
{
  "fullSentence":"完整日文經文",
  "translation":"繁體中文翻譯（台灣慣用語）",
  "chunks":[{
    "text":"自然發音片段",
    "tts":"假名（無漢字可省略）",
    "type":"noun|verb|particle|adj|other",
    "highlights":[{"target":"字","cssClass":"color-noun-green|color-verb-blue|color-particle-red","note":"備註"}],
    "explanation":{
      "title":"emoji + 簡短標題（如「🎯 助詞 が」）",
      "kind":"語序倒裝|助詞|動詞時態|詞彙",
      "badge":"類型｜口訣副標（如「助詞｜萬能雙面膠」、「動詞時態｜變身系統」）",
      "metaphor":"一句生動比喻（用積木/雙面膠/變身/圖釘等口訣，30字內）",
      "compare":{"cn":"中文怎麼說（保留原文順序對照）","jp":"日文怎麼說（保留原文順序對照）","note":"中日差異一句話"},
      "steps":["判斷步驟1","步驟2","步驟3（共 2-4 步）"],
      "examples":[{"jp":"日文簡單例句","cn":"中文翻譯"}],
      "trap":"⚠️ 初學者最常踩的陷阱（如：は 念 wa 不念 ha；が 不是「但是」的意思）",
      "quiz":{"q":"問題（情境式）","options":["選項A","選項B","選項C"],"answer":0,"explain":"答對的解釋（為什麼這個是對的）"}
    }
  }],
  "roleplay":{"instruction":"角色扮演指示","acceptKeywords":["關鍵字1","關鍵字2"]},
  "bonusLearning":{"title":"延伸文法主題","content":"HTML 決策樹/說明","warningNote":"陷阱"},
  "writeSegments":["手寫分段1（8~16字）","手寫分段2","…"]
}

【規則】
- chunks 拆成自然發音區塊（助詞獨立成 chunk，動詞 / 動詞詞組獨立一塊，名詞詞組合併）
- 每個 chunk 必須有完整 explanation
- examples 必須是初學者級別（簡短、常用詞彙、5-10 字）
- quiz 必須有 3 個選項，answer 是正確答案的 0-based 索引
- 若 chunk 是普通名詞且無特殊文法重點（kind="詞彙"），可省略 quiz 與 trap
- 中文翻譯必使用台灣慣用語（影片、捷運、軟體、列印…），避免大陸用語
- metaphor 與 trap 要口語化、可愛、有畫面感
- bonusLearning 為【必填】欄位，不可省略。title 必須是本節經文出現的一個進階文法主題（如「は vs が 的判斷口訣」「動詞て形的 5 種用法」），content 必須是完整 HTML 教學（至少 80 字，含 <b> <ul> <li> 等標籤，用積木/雙面膠比喻），warningNote 必須是一句初學者陷阱提醒
- writeSegments 為【必填】陣列。將 fullSentence（不含標點）拆成手寫練習分段，每段 8~16 字。【斷句鐵則】：絕對不可切斷詞語（ことば、ともに、初めに 等必須完整保留在同一段），在助詞後方或句號處斷開。段落中只包含假名和漢字，不含標點符號（。，、）`;

// ═══ TTS/STT ═══
function findVoice(){const v=synth.getVoices();jpVoice=v.find(x=>x.lang==='ja-JP'&&x.name.includes('Google'))||v.find(x=>x.lang==='ja-JP')||null;}
synth.addEventListener('voiceschanged',findVoice);findVoice();
function speakJP(t,r=0.8){synth.cancel();return new Promise(res=>{const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=r;if(jpVoice)u.voice=jpVoice;u.onend=res;u.onerror=res;synth.speak(u);})}
function hasKanji(t){return/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(t);}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let recognition;
if(SR){recognition=new SR();recognition.lang='ja-JP';recognition.interimResults=false;}
function startSpeech(){
  const rd=document.getElementById('speak-result');if(!rd)return;
  if(!recognition){rd.textContent='❌ 不支援';return;}
  if(!currentUnit){rd.textContent='請先選擇經文';return;}
  rd.textContent='🔴 聆聽中…';rd.className='speak-result';
  try{recognition.start();}catch(e){recognition.stop();setTimeout(()=>{rd.textContent='🔴 重新聆聽…';try{recognition.start();}catch(e2){rd.textContent='❌ '+e2.message;}},500);return;}
  recognition.onaudiostart=()=>{rd.textContent='🔴 錄音中…';};
  recognition.onspeechstart=()=>{rd.textContent='🔴 偵測到語音…';};
  recognition.onresult=e=>{const t=e.results[0][0].transcript;let mc=0;(currentUnit.roleplay?.acceptKeywords||[]).forEach(kw=>{if(t.includes(kw))mc++;});if(mc>0){rd.textContent='🎉 太棒了！「'+t+'」';rd.className='speak-result ok';}else{rd.textContent='你說了「'+t+'」🧐 再試！';rd.className='speak-result ng';}};
  recognition.onerror=e=>{rd.textContent='❌ '+e.error;rd.className='speak-result ng';};
  recognition.onend=()=>{if(rd.textContent==='🔴 聆聽中…'||rd.textContent==='🔴 重新聆聽…')rd.textContent='（沒聽到，再試 🎤）';};
}

function updateExportStats(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('bg-'));
  const totalBytes=keys.reduce((s,k)=>s+localStorage.getItem(k).length*2,0);
  const books=new Set(keys.map(k=>k.split('-')[1]));
  document.getElementById('export-stats').textContent='📦 已快取 '+keys.length+' 節（'+books.size+' 卷）≈ '+(totalBytes/1024).toFixed(0)+' KB';
}

  if(!keys.length){showToast('沒有可匯出的快取');return;}

function importCache(event){

  reader.onload=function(e){

      const verses=json.verses||json;// support both wrapped and raw format
      if(typeof verses!=='object'){showToast('❌ 無效的 JSON 格式');return;}
      let imported=0,skipped=0;
      Object.keys(verses).forEach(k=>{
        if(!k.startsWith('bg-'))return;

        if(localStorage.getItem(k)){skipped++;return;}

      });

  event.target.value='';// reset input so same file can be selected again
}

// ═══ LOAD VERSE: cache → Gemini → fallback ═══
// Unified Gemini caller with:
//  - 429 retry (parses retryDelay from Google's error, max 2 retries, capped 8s)
//  - Model fallback chain (404/UNAVAILABLE → switch to next model & remember)
//  - Used by both text analysis and handwriting OCR
async function callGemini(body,opts){
  if(!GEMINI_KEY)throw new Error('NO_KEY');
  opts=opts||{};const maxRetry=opts.maxRetry??2;
  let lastErr=null;
  for(let mi=0;mi<GEMINI_MODELS.length;mi++){
    const model=mi===0?GEMINI_MODEL:GEMINI_MODELS[mi];
    if(mi>0&&model===GEMINI_MODEL)continue;// already tried as primary
    for(let attempt=0;attempt<=maxRetry;attempt++){
      try{
        const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+GEMINI_KEY,{
          method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
        });
        if(res.ok){
          if(model!==GEMINI_MODEL){GEMINI_MODEL=model;try{localStorage.setItem('bible-gemini-model',model);}catch(e){}showToast('🔄 已切換到 '+model);}
          apiTrackCall(true);
          return await res.json();
        }
        const errData=await res.json().catch(()=>({error:{code:res.status,message:res.statusText}}));
        const code=errData?.error?.code||res.status;
        const status=errData?.error?.status||'';
        if(code===429&&attempt<maxRetry){
          // Parse retryDelay (e.g. "52s") from Google's response
          let waitMs=Math.min(8000,2000*Math.pow(2,attempt));
          const retryInfo=errData?.error?.details?.find(d=>d['@type']?.includes('RetryInfo'));
          if(retryInfo?.retryDelay){const m=retryInfo.retryDelay.match(/(\d+(?:\.\d+)?)s/);if(m){const s=parseFloat(m[1]);if(s<10)waitMs=Math.ceil(s*1000)+200;}}
          if(opts.onRetry)opts.onRetry(attempt+1,maxRetry,Math.ceil(waitMs/1000));
          await new Promise(r=>setTimeout(r,waitMs));continue;
        }
        if(code===404||status==='NOT_FOUND'||status==='UNAVAILABLE'){lastErr=new Error('MODEL_'+code+'_'+model);break;}// try next model
        if(code===429){lastErr=new Error('QUOTA');apiTrackCall(false,'QUOTA');break;}// final attempt failed → don't try other models, same quota
        if(code===400&&errData?.error?.message?.includes('API key')){apiTrackCall(false,'BAD_KEY');throw new Error('BAD_KEY');}
        throw new Error('API_'+code+': '+(errData?.error?.message||'unknown').slice(0,80));
      }catch(e){
        if(e.message==='BAD_KEY'||e.message==='QUOTA')throw e;
        if(attempt>=maxRetry){lastErr=e;break;}
        await new Promise(r=>setTimeout(r,1500));
      }
    }
  }
  throw lastErr||new Error('ALL_MODELS_FAILED');
}

async function analyzeWithGemini(prompt){
  const data=await callGemini({
    contents:[{parts:[{text:GRAMMAR_PROMPT+'\n\n【經文】\n'+prompt}]}],
    generationConfig:{responseMimeType:'application/json'}
  },{onRetry:(n,max,sec)=>showToast('⏳ 配額限制，'+sec+'秒後重試 ('+n+'/'+max+')')});
  const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function loadVerse(num){
  setLoading(true);curVerse=num;

  let unit=null;
  // 1. Cache
  try{const c=localStorage.getItem(ck);if(c)unit=JSON.parse(c);}catch(e){}
  // 2. Gemini (unified: all 66 books go through Gemini for Japanese text + analysis)
  if(!unit&&GEMINI_KEY){
    const bookName=document.getElementById('book-select').selectedOptions[0]?.textContent||curBook;
    const prompt='請查詢日文聖經（口語訳）'+bookName+' 第'+curChapter+'章 第'+num+'節，並進行文法分析。';
    try{
      document.getElementById('listen-display').innerHTML='<span style="font-size:0.7rem;color:rgba(60,64,67,0.5);">🧠 AI 分析中…</span>';

      unit.book=curBook;unit.chapter=curChapter;unit.verse=num;
      localStorage.setItem(ck,JSON.stringify(unit));renderVersePills();
      // Drive sync: upload new verse to cloud
      if(typeof driveUploadVerse==='function')driveUploadVerse(curBook,curChapter,num,unit).catch(e=>console.log('Drive upload:',e.message));
    }catch(e){
      const msg=e.message||'';
      if(msg==='NO_KEY')showToast('請先設定 Gemini API Key ⚙️');
      else if(msg==='BAD_KEY')showToast('❌ API Key 無效，請重設 ⚙️');
      else if(msg==='QUOTA')showToast('⏳ 配額用完，請稍後再試或明天 16:00 重置');
      else if(msg.startsWith('MODEL_'))showToast('❌ 模型不可用，已嘗試所有備援');
      else if(msg.startsWith('API_'))showToast('❌ '+msg);
      else showToast('AI 分析失敗：'+msg.slice(0,40));
    }
  }
  // 3. Fallback: bible.js pre-compiled
  if(!unit&&typeof BIBLE_DATA!=='undefined'){
    const pre=BIBLE_DATA?.john_1?.units?.find(u=>u.verse==num||u.verse===num+'');
    if(pre)unit=pre;
  }
  // 4. Raw text fallback
  if(!unit){
    const verse=chapterVerses.find(v=>v.num===num);const t=verse?.text||'（請設定 Gemini API Key）';
    unit={fullSentence:t,translation:'（需要 API Key）',fullTts:t,chunks:[{text:t,tts:t,type:'other',highlights:[],explanation:null}],roleplay:{acceptKeywords:[]},bonusLearning:{title:'設定 API Key',content:'<p>⚙️ 設定 Gemini API Key 即可自動分析全本聖經</p>'}};
  }
  currentUnit=unit;buildListen(unit);buildWrite(unit);buildBonus(unit);
  setTimeout(()=>initCanvas(),300);updateProgress();setLoading(false);
  // Schedule background prefetch for remaining verses in this chapter
  if(unit&&GEMINI_KEY)schedulePrefetch();
}

function findRelatedVerses(kind,chunkText,maxN){
  const out=[];const seen=new Set();const limit=maxN||3;
  try{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('bg-'));
    for(const key of keys){
      if(out.length>=limit)break;
      try{
        const u=JSON.parse(localStorage.getItem(key));if(!u||!Array.isArray(u.chunks))continue;
        const ref=key.slice(3).split('-');if(ref.length<3)continue;
        if(ref[0]===curBook&&+ref[1]===curChapter&&+ref[2]===curVerse)continue;
        let match=null;let priority=99;
        for(const ch of u.chunks){
          if(!ch.explanation)continue;
          const ckind=ch.explanation.kind||ch.explanation.type||'';
          if(chunkText&&ch.text===chunkText&&priority>1){match=ch;priority=1;}
          else if(kind&&ckind===kind&&priority>2){match=ch;priority=2;}
        }
        if(!match)continue;
        const id=ref.join('-');if(seen.has(id))continue;seen.add(id);
        const allBooks=ALL_BOOKS.OT.concat(ALL_BOOKS.NT);
        const bk=allBooks.find(b=>b.id===ref[0]);
        out.push({book:ref[0],chapter:+ref[1],verse:+ref[2],ref:(bk?bk.name:ref[0])+' '+ref[1]+':'+ref[2],snip:(u.fullSentence||'').slice(0,28),priority});
      }catch(e){}
    }
  }catch(e){}
  out.sort((a,b)=>a.priority-b.priority);
  return out;
}

  // Detect if this entry has the new structured fields
  const hasStructured=!!(info.metaphor||info.compare||(Array.isArray(info.steps)&&info.steps.length)||(Array.isArray(info.examples)&&info.examples.length)||info.quiz);
  let html='';

  // Steps (decision tree)
  if(Array.isArray(info.steps)&&info.steps.length){

  // Trap
  if(info.trap)html+='<div class="gm-trap"><b>⚠️ 陷阱：</b>'+escapeHtml(info.trap)+'</div>';

  if(info.quiz&&Array.isArray(info.quiz.options)&&info.quiz.options.length>=2){

  if(related.length){

      html+='</button>';
    });
    html+='</div></div>';
  }
  // Legacy fallback: render old HTML content if no new structured data
  if(!hasStructured&&info.content)html+='<div class="gm-section">'+info.content+'</div>';
  if(!html)html='<p style="color:var(--text-dim);">沒有更多解說。</p>';
  bodyEl.innerHTML=html;
  // Warning (legacy - only show if no trap rendered)
  if(info.warningNote&&!info.trap){warnEl.textContent='⚠️ '+info.warningNote;warnEl.style.display='block';}
  else{warnEl.style.display='none';}
  // Re-analyze button (only for legacy data without structured fields)
  const actionsDiv=document.querySelector('#grammar-modal .gm-actions');
  const oldBtn=document.getElementById('gm-reanalyze-btn');if(oldBtn)oldBtn.remove();
  if(!hasStructured&&actionsDiv){
    const btn=document.createElement('button');btn.id='gm-reanalyze-btn';btn.className='gm-reanalyze';btn.textContent='🔄 升級分析';btn.onclick=reAnalyzeCurrentVerse;
    actionsDiv.insertBefore(btn,actionsDiv.firstChild);
  }
  document.getElementById('grammar-modal').classList.add('open');
}

// ═══ WRITE: split + segment ═══
const TB={noun:'#8FA88B',verb:'#7B9DAB',particle:'#C4877A',adj:'#C9B88C',other:'#A8A49B'};
function isKanjiChar(ch){const c=ch.codePointAt(0);return(c>=0x4E00&&c<=0x9FFF)||(c>=0x3400&&c<=0x4DBF);}
function getCharTypeMap(u){const map=[],chars=[...u.fullSentence];let pos=0;for(const ck of u.chunks){for(const cc of[...ck.text]){if(pos<chars.length&&chars[pos]===cc){map[pos]=ck.type;pos++;}}}for(let i=0;i<chars.length;i++)if(!map[i])map[i]='other';return map;}
function simPack(chars,cols){const MR=40,o=Array.from({length:MR},()=>new Array(cols).fill(false));let maxR=0;for(const ch of chars){const cs=isKanjiChar(ch)?2:1,rs=cs;let placed=false;for(let r=0;r<MR-rs&&!placed;r++)for(let c=0;c<=cols-cs&&!placed;c++){let ok=true;for(let dr=0;dr<rs&&ok;dr++)for(let dc=0;dc<cs&&ok;dc++)if(o[r+dr][c+dc])ok=false;if(ok){for(let dr=0;dr<rs;dr++)for(let dc=0;dc<cs;dc++)o[r+dr][c+dc]=true;maxR=Math.max(maxR,r+rs);placed=true;}}}return maxR;}

function smartSplit(t,mx){mx=mx||20;let s=t.split(/(?<=[。，、])/).filter(x=>x.trim().length>0);const r=[];for(const seg of s){if([...seg].length<=mx)r.push(seg);else{const ch=[...seg];for(let i=0;i<ch.length;i+=mx)r.push(ch.slice(i,i+mx).join(''));}}return r.length>0?r:[t];}

function buildWrite(u){
  if(!u)return;
  // Priority 1: Gemini writeSegments (AI-driven, never breaks words)
  if(Array.isArray(u.writeSegments)&&u.writeSegments.length>0&&u.writeSegments.every(s=>s&&s.length>0)){
    _writeSegs=u.writeSegments.map(s=>s.replace(/[。，、！？「」（）；：\s　]/g,''));
    _writeSegs=_writeSegs.filter(s=>s.length>0);
    if(_writeSegs.length>0){_writeSegIdx=0;buildWriteSegment(u,0);return;}
  }
  // Priority 2: fallback to smartSplit
  _writeSegs=smartSplit(u.fullSentence,20);_writeSegIdx=0;buildWriteSegment(u,0);
}

// ═══ DICTATION MODE: per-segment blur + voice hint ═══
let _dictationActive=false;// toggle state for dictation mode
function toggleDictation(){
  if(_dictationActive){
    // Turn OFF: unblur and restore button color
    unblurAllChunks();
    _dictationActive=false;
    updateSegNavStyle();
  }else{
    // Turn ON: blur current segment
    blurCurrentSegChunks();
    _dictationActive=true;
    updateSegNavStyle();
  }
}
function activateDictation(){
  if(!_dictationActive){_dictationActive=true;blurCurrentSegChunks();updateSegNavStyle();}
}
function updateSegNavStyle(){
  // Update the active segment button color: dictation ON = pulsing accent, OFF = normal
  const btns=document.querySelectorAll('.seg-nav-btn');
  btns.forEach(b=>{
    const idx=parseInt(b.dataset.seg);
    if(idx===_writeSegIdx){
      if(_dictationActive){
        b.style.background='#C4877A';b.style.color='#F0EBE1';b.style.boxShadow='0 0 0 2px rgba(196,135,122,0.5)';
      }else{
        b.style.background='rgba(60,64,67,0.3)';b.style.color='#F0EBE1';b.style.boxShadow='none';
      }

  });
}
function blurCurrentSegChunks(){
  if(!currentUnit||!_writeSegs.length)return;
  const chunks=currentUnit.chunks||[];
  const segIdx=_writeSegIdx;
  const segText=_writeSegs[segIdx]||'';
  let segStart=0;
  for(let i=0;i<segIdx;i++)segStart+=[..._writeSegs[i]].length;
  const segEnd=segStart+[...segText].length;
  let pos=0;const chunkRanges=[];
  for(const c of chunks){
    const cLen=[...c.text].filter(ch=>!/[。，、！？「」（）；：\s　]/.test(ch)).length;
    chunkRanges.push({start:pos,end:pos+cLen});pos+=cLen;
  }
  const wraps=document.querySelectorAll('.chunk-wrap');
  wraps.forEach((w,ci)=>{
    const range=chunkRanges[ci];if(!range)return;
    const overlaps=range.start<segEnd&&range.end>segStart;
    if(overlaps){
      w.classList.add('chunk-blurred');w.classList.remove('peek');
      w.onclick=function(e){e.stopPropagation();w.classList.add('peek');setTimeout(()=>w.classList.remove('peek'),2000);};
    }else{
      w.classList.remove('chunk-blurred','peek');
      const chunk=chunks[ci];
      w.onclick=function(e){e.stopPropagation();if(chunk&&chunk.explanation)showGrammarModal(chunk.explanation,chunk.text);};
    }
  });
}
function unblurAllChunks(){document.querySelectorAll('.chunk-blurred').forEach(w=>w.classList.remove('chunk-blurred','peek'));}
function playWriteHint(speed){
  if(!currentUnit)return;
  const segText=_writeSegs[_writeSegIdx]||'';
  const chunks=currentUnit.chunks||[];
  let segStart=0;
  for(let i=0;i<_writeSegIdx;i++)segStart+=[..._writeSegs[i]].length;
  const segEnd=segStart+[...segText].length;
  let pos=0;const segChunks=[];
  for(const c of chunks){
    const cLen=[...c.text.replace(/[。，、！？「」（）；：\s　]/g,'')].length;
    const cEnd=pos+cLen;
    if(cEnd>segStart&&pos<segEnd)segChunks.push(c.tts||c.text);
    pos=cEnd;
  }
  const ttsText=segChunks.length?segChunks.join(''):segText;
  speakJP(ttsText,speed==='slow'?0.5:0.85);
}

function buildWriteSegment(u,segIdx){
  if(!u||segIdx<0||segIdx>=_writeSegs.length)return;_writeSegIdx=segIdx;
  const segText=_writeSegs[segIdx],chars=[...segText];
  let segStart=0;for(let i=0;i<segIdx;i++)segStart+=[..._writeSegs[i]].length;
  const fullTypeMap=getCharTypeMap(u),typeMap=fullTypeMap.slice(segStart,segStart+chars.length);
  const wt=document.querySelector('.t-write');if(!wt)return;
  wt.innerHTML='';wt.style.cssText+='display:flex;flex-direction:column;padding:6px 10px;';
  let segNav='';if(_writeSegs.length>1){segNav='<div style="display:flex;gap:2px;align-items:center;">';_writeSegs.forEach((s,i)=>{segNav+='<span class="seg-nav-btn" data-seg="'+i+'" onclick="if(_writeSegIdx!=='+i+'){_dictationActive=false;buildWriteSegment(currentUnit,'+i+');}else{toggleDictation();}" style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-size:0.5rem;font-weight:700;cursor:pointer;'+(i===segIdx?'background:rgba(60,64,67,0.3);color:#F0EBE1;':i<segIdx?'background:#8FA88B;color:#F0EBE1;':'background:rgba(60,64,67,0.15);color:#6B6860;')+'">'+(i+1)+'</span>';});segNav+='</div>';}
  const hd=document.createElement('div');hd.style.cssText='display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:3px;gap:4px;position:relative;z-index:10;';
  hd.innerHTML='<div style="display:flex;gap:3px;align-items:center;"><button onclick="clearAllTiles()" style="padding:3px 7px;border:none;border-radius:6px;font-size:0.55rem;font-weight:700;cursor:pointer;background:rgba(60,64,67,0.2);color:#3C4043;">❌</button><button onclick="submitSegment()" style="padding:3px 7px;border:none;border-radius:6px;font-size:0.55rem;font-weight:700;cursor:pointer;background:#C4877A;color:#F0EBE1;">🔍</button><button class="voice-hint-btn" onclick="event.stopPropagation();activateDictation();playWriteHint(\'normal\')" title="語音提示">🔊</button><button class="voice-hint-btn" onclick="event.stopPropagation();activateDictation();playWriteHint(\'slow\')" title="慢速語音">🐢</button>'+segNav+'</div><span style="font-size:0.55rem;font-weight:700;color:#F0EBE1;max-width:40%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🇹🇼 '+(u.translation||'')+'</span>';
  wt.appendChild(hd);
  // Don't auto-blur: wait for user to actively start writing (click segment / voice hint / draw)
  const vw=wt.getBoundingClientRect().width-20,vh=wt.getBoundingClientRect().height-30,gap=3;
  let bestCols=6,bestCell=30;for(let cols=3;cols<=7;cols++){const cW=Math.floor((vw-gap*(cols+1))/cols),rows=simPack(chars,cols);if(!rows)continue;const cH=Math.floor((vh-gap*(rows+1))/rows),c=Math.min(cW,cH,200);if(c>bestCell){bestCell=c;bestCols=cols;}}
  const numCols=bestCols,cell=bestCell,MR=40,occ=Array.from({length:MR},()=>new Array(numCols).fill(false));
  function findSlot(cs,rs){for(let r=0;r<MR-rs;r++)for(let c=0;c<=numCols-cs;c++){let ok=true;for(let dr=0;dr<rs&&ok;dr++)for(let dc=0;dc<cs&&ok;dc++)if(occ[r+dr][c+dc])ok=false;if(ok)return{r,c};}return{r:0,c:0};}
  function place(r,c,cs,rs){for(let dr=0;dr<rs;dr++)for(let dc=0;dc<cs;dc++)occ[r+dr][c+dc]=true;}
  const tiles=[];chars.forEach((ch,i)=>{const isK=isKanjiChar(ch),isPu=/[、。！？「」（）]/.test(ch),cs=isK?2:1,rs=cs,s=findSlot(cs,rs);place(s.r,s.c,cs,rs);tiles.push({idx:i,col:s.c+1,row:s.r+1,cs,rs,type:isPu?'other':(typeMap[i]||'other'),isK});});
  const gw=document.createElement('div');gw.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden;';
  const g=document.createElement('div');g.style.cssText='display:grid;gap:'+gap+'px;grid-template-columns:repeat('+numCols+','+cell+'px);grid-auto-rows:'+cell+'px;justify-content:center;';
  window._p3Chars=chars;window._p3TileSizes=[];
  tiles.forEach(t=>{const bg=TB[t.type]||TB.other,tile=document.createElement('div');tile.id='p3-box-'+t.idx;tile.style.cssText='grid-column:'+t.col+'/span '+t.cs+';grid-row:'+t.row+'/span '+t.rs+';background:'+bg+';border-radius:4px;position:relative;overflow:hidden;cursor:crosshair;box-shadow:0 1px 4px rgba(0,0,0,0.3);';const sz=cell*(t.isK?2:1)+(t.isK?gap:0);window._p3TileSizes[t.idx]=sz;const dc=document.createElement('canvas');dc.id='p3-draw-'+t.idx;dc.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:2;touch-action:none;';tile.appendChild(dc);
  const lb=document.createElement('div');lb.style.cssText='position:absolute;bottom:0;left:0;z-index:5;font-size:0.8rem;color:#1a1a2e;font-weight:700;cursor:pointer;padding:4px 8px;background:rgba(255,255,255,0.15);border-radius:0 6px 0 4px;';lb.textContent=(t.idx+1);(function(idx){lb.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();const cv=document.getElementById('p3-draw-'+idx);if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);});lb.addEventListener('touchend',function(e){e.stopPropagation();e.preventDefault();const cv=document.getElementById('p3-draw-'+idx);if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);});})(t.idx);tile.appendChild(lb);
  if(t.isK){const tg=document.createElement('span');tg.style.cssText='position:absolute;top:2px;right:3px;z-index:3;font-size:0.45rem;color:rgba(62,50,43,0.45);pointer-events:none;font-weight:700;';tg.textContent='漢';tile.appendChild(tg);}g.appendChild(tile);});
  gw.appendChild(g);wt.appendChild(gw);setTimeout(()=>initCanvas(),200);hasWritten=false;
}

function initCanvas(){const chars=window._p3Chars;if(!chars)return;const sizes=window._p3TileSizes||[];chars.forEach((ch,i)=>{const dc=document.getElementById('p3-draw-'+i);if(!dc)return;const sz=sizes[i]||60;const clone=dc.cloneNode(true);dc.parentNode.replaceChild(clone,dc);const fc=document.getElementById('p3-draw-'+i);fc.width=sz;fc.height=sz;const ctx=fc.getContext('2d');ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=Math.max(2,sz*0.025);ctx.strokeStyle='#3C4043';let d=false;function gp(e){const r=fc.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx-r.left)*(fc.width/r.width),y:(cy-r.top)*(fc.height/r.height)};}fc.addEventListener('mousedown',e=>{e.preventDefault();d=true;if(!hasWritten)activateDictation();hasWritten=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});fc.addEventListener('mousemove',e=>{if(!d)return;e.preventDefault();const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();});fc.addEventListener('mouseup',()=>d=false);fc.addEventListener('touchstart',e=>{e.preventDefault();d=true;if(!hasWritten)activateDictation();hasWritten=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});fc.addEventListener('touchmove',e=>{if(!d)return;e.preventDefault();const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});fc.addEventListener('touchend',()=>d=false);});hasWritten=false;}

function clearAllTiles(){const chars=window._p3Chars;if(!chars)return;chars.forEach((c,i)=>{const cv=document.getElementById('p3-draw-'+i);if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);const bx=document.getElementById('p3-box-'+i);if(bx){bx.style.boxShadow='0 1px 4px rgba(0,0,0,0.3)';const old=bx.querySelector('.ocr-label');if(old)old.remove();}});hasWritten=false;}

function showOcrLabel(box,text,isError){

async function submitSegment(){
  if(!hasWritten){showToast('請先寫字！✍️');return;}
  const chars=window._p3Chars;if(!chars)return;let ok=0;

  if(GEMINI_KEY){
    // Loading overlay with timer
    const overlay=document.createElement('div');overlay.id='ocr-loading';
    overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,30,36,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#F0EBE1;font-family:inherit;';
    overlay.innerHTML='<div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">🧠 AI 辨識中…</div>'
      +'<div id="ocr-timer" style="font-size:2.2rem;font-weight:900;color:#C9B88C;font-family:monospace;">0.0s</div>'
      +'<div style="font-size:0.7rem;color:#8B8780;margin-top:8px;">'+chars.length+' 個字一次辨識</div>';
    document.body.appendChild(overlay);
    const t0=Date.now();
    const tid=setInterval(()=>{const el=document.getElementById('ocr-timer');if(el)el.textContent=((Date.now()-t0)/1000).toFixed(1)+'s';},100);

    const parts=[];const validIdx=[];
    for(let i=0;i<chars.length;i++){
      const cv=document.getElementById('p3-draw-'+i);if(!cv)continue;
      parts.push({inlineData:{mimeType:'image/png',data:cv.toDataURL('image/png').split(',')[1]}});
      validIdx.push(i);
    }
    const targetList=validIdx.map((vi,pi)=>'圖'+(pi+1)+'→「'+chars[vi]+'」').join('、');
    parts.push({text:'你是手寫日文辨識器。以下 '+validIdx.length+' 張圖片是手寫的日文字。\n'
      +'對照目標：'+targetList+'\n'
      +'逐張判斷是否正確。回傳純 JSON 陣列（無 markdown），格式：\n'
      +'[{"idx":1,"target":"目標字","seen":"辨識到的字","ok":true/false}]\n'
      +'每張圖必須有一筆結果，idx 從 1 開始。'});

    try{
      const data=await callGemini({contents:[{parts}]},{maxRetry:1});
      const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      let results;try{results=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(pe){results=[];}
      const resMap=new Map();
      (Array.isArray(results)?results:[]).forEach(r=>{const idx=typeof r.idx==='number'?r.idx:parseInt(r.idx);if(!isNaN(idx))resMap.set(idx,r);});
      validIdx.forEach((vi,pi)=>{
        const bx=document.getElementById('p3-box-'+vi);if(!bx)return;
        bx.style.position='relative';
        const old=bx.querySelector('.ocr-label');if(old)old.remove();
        const r=resMap.get(pi+1);
        const label=document.createElement('div');label.className='ocr-label';
        label.style.cssText='position:absolute;bottom:2px;left:50%;transform:translateX(-50%);padding:2px 7px;border-radius:8px;font-size:0.55rem;font-weight:700;white-space:nowrap;z-index:10;pointer-events:none;text-align:center;';
        if(r&&r.ok===true){
          bx.style.boxShadow='0 0 0 3px #00e676';ok++;
          label.style.background='rgba(143,168,139,0.9)';label.style.color='#F0EBE1';
          label.textContent='✅ '+(r.seen||chars[vi]);
        }else if(r){
          bx.style.boxShadow='0 0 0 3px #C4877A';
          label.style.background='rgba(196,135,122,0.92)';label.style.color='#F0EBE1';
          label.textContent='❌ AI:「'+(r.seen||'？')+'」';
        }else{
          bx.style.boxShadow='0 0 0 3px #00e676';ok+=0.5;
          label.style.background='rgba(201,184,140,0.8)';label.style.color='#1E1E24';
          label.textContent='⚠️ 無結果';
        }
        bx.appendChild(label);
        setTimeout(()=>{if(label.parentNode)label.remove();},10000);
      });
    }catch(e){
      if(e.message==='QUOTA')showToast('⏳ 配額用完，以基本分計算');
      else if(e.message==='BAD_KEY')showToast('❌ Key 無效');
      else showToast('OCR 失敗');
      chars.forEach((_,i)=>{const bx=document.getElementById('p3-box-'+i);if(bx)bx.style.boxShadow='0 0 0 3px #00e676';});
      ok=chars.length*0.5;
    }
    clearInterval(tid);const ov=document.getElementById('ocr-loading');if(ov)ov.remove();

  }else{
    chars.forEach((_,i)=>{const bx=document.getElementById('p3-box-'+i);if(bx)bx.style.boxShadow='0 0 0 3px #00e676';});
    ok=chars.length;
  }

  const pct=ok/chars.length,score=Math.round(pct*12);totalScore+=score;
  showScorePopup(score,pct>=0.9?'完美！':pct>=0.6?'不錯！':'繼續加油');updateProgress();saveProgress();
  // Reveal the blurred chunks after scoring
  _dictationActive=false;unblurAllChunks();
  setTimeout(()=>{document.querySelector('.score-popup')?.remove();
    if(_writeSegIdx+1<_writeSegs.length){showToast('✍️ 第'+(_writeSegIdx+2)+'/'+_writeSegs.length+' 段');buildWriteSegment(currentUnit,_writeSegIdx+1);}
    else{showToast('🎉 整句完成！');setTimeout(()=>{if(curVerse<chapterVerses.length){curVerse++;renderVersePills();loadVerse(curVerse);saveProgress();}},1500);}
  },5000);
}

async function fetchBonusLearning(){
  if(!currentUnit||!GEMINI_KEY)return null;

  try{

    },{maxRetry:1});
    const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const bonus=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(bonus?.title&&bonus?.content){
      currentUnit.bonusLearning=bonus;
      const ck='bg-'+curBook+'-'+curChapter+'-'+curVerse;
      try{localStorage.setItem(ck,JSON.stringify(currentUnit));}catch(e){}
      return bonus;
    }
  }catch(e){console.error('fetchBonusLearning:',e.message);}
  return null;
}

// ═══ API QUOTA TRACKER ═══
// Tracks Gemini API calls per minute and overall status
const _apiLog=[];// timestamps of recent calls
let _apiStatus='idle';// idle|ok|warn|err|quota
let _apiLastError='';
let _apiTotalCalls=0;

function apiTrackCall(success,errorMsg){
  _apiLog.push(Date.now());
  _apiTotalCalls++;
  // Keep only last 2 minutes of data
  const cutoff=Date.now()-120000;
  while(_apiLog.length&&_apiLog[0]<cutoff)_apiLog.shift();
  if(success){_apiStatus='ok';_apiLastError='';}
  else{_apiStatus=errorMsg==='QUOTA'?'quota':'err';_apiLastError=errorMsg||'error';}
  apiUpdateBadge();
}

function apiGetRPM(){
  const cutoff=Date.now()-60000;
  return _apiLog.filter(t=>t>=cutoff).length;
}

function apiUpdateBadge(){
  const el=document.getElementById('api-badge');if(!el)return;
  const rpm=apiGetRPM();
  if(_apiStatus==='quota'){
    el.textContent='⏳ 配額滿';el.className='api-badge err';
  }else if(_apiStatus==='err'){
    el.textContent='❌ 錯誤';el.className='api-badge err';
  }else if(rpm>0){
    el.textContent=rpm+'/min'+(_prefetchActive?' 📥':'');
    el.className='api-badge '+(rpm>=12?'warn':'ok');
  }else if(_apiTotalCalls>0){
    el.textContent='✓ 就緒';el.className='api-badge ok';
  }else if(GEMINI_KEY){
    el.textContent='✓ 就緒';el.className='api-badge ok';
  }else{
    el.textContent='無 Key';el.className='api-badge';
  }
}

function showApiStatus(){
  const rpm=apiGetRPM();
  const lines=['📊 API 配額狀態','','模型：'+GEMINI_MODEL,'本次呼叫：'+_apiTotalCalls+' 次','近 1 分鐘：'+rpm+' 次',
    '狀態：'+({idle:'待機',ok:'✅ 正常',warn:'⚠️ 接近上限',err:'❌ '+_apiLastError,quota:'⏳ 配額用完'}[_apiStatus]||_apiStatus),
    '背景預載：'+(_prefetchActive?'進行中 (剩 '+_prefetchQueue.filter(v=>!localStorage.getItem('bg-'+curBook+'-'+curChapter+'-'+v)).length+'節)':'未啟動'),
    '','Gemini 免費額度：15 RPM / 1500 RPD','預載限制：≤10 RPM（保留 5 RPM 給手寫）','（每日台灣時間 16:00 重置）'];
  alert(lines.join('\n'));
}

// ═══ BACKGROUND CHAPTER PREFETCH ═══
// Prefetches missing verses for the current chapter in background
// Rate-limited: max 5 RPM (reserves 10 RPM for OCR/normal use)
// Stops on quota error (429) to preserve remaining API calls
let _prefetchActive=false,_prefetchAbort=false,_prefetchQueue=[];
const PREFETCH_INTERVAL=13000;// 13 sec between calls (~4.6/min, safely under 5 RPM)
const PREFETCH_RPM_LIMIT=10;// stop prefetch if total RPM reaches this

async function startPrefetch(){
  if(_prefetchActive||!GEMINI_KEY)return;
  const book=curBook,chapter=curChapter;
  const vc=VERSE_COUNTS[book];if(!vc||!vc[chapter-1])return;
  const totalVerses=vc[chapter-1];
  // Build queue: missing verses only
  _prefetchQueue=[];
  for(let v=1;v<=totalVerses;v++){
    const ck='bg-'+book+'-'+chapter+'-'+v;
    if(!localStorage.getItem(ck))_prefetchQueue.push(v);
  }
  if(!_prefetchQueue.length){console.log('Prefetch: chapter complete');return;}
  _prefetchActive=true;_prefetchAbort=false;
  console.log('Prefetch: starting '+book+' '+chapter+' ('+_prefetchQueue.length+'/'+totalVerses+' missing)');
  showToast('📥 背景預載 '+book+' '+chapter+'章 ('+_prefetchQueue.length+'節)');
  apiUpdateBadge();
  for(const v of _prefetchQueue){
    if(_prefetchAbort)break;
    // Check if chapter changed (user navigated away)
    if(curBook!==book||curChapter!==chapter){console.log('Prefetch: chapter changed, stopping');break;}
    // Check RPM limit: leave room for OCR
    if(apiGetRPM()>=PREFETCH_RPM_LIMIT){
      console.log('Prefetch: RPM limit reached, pausing');
      showToast('📥 預載暫停（保留配額給手寫辨識）');
      // Wait until RPM drops
      await new Promise(r=>setTimeout(r,30000));
      if(_prefetchAbort||curBook!==book||curChapter!==chapter)break;
    }
    // Skip if already cached (might have been loaded by user in the meantime)
    const ck='bg-'+book+'-'+chapter+'-'+v;
    if(localStorage.getItem(ck))continue;
    // Fetch
    try{
      const bookName=document.getElementById('book-select').selectedOptions[0]?.textContent||book;
      const prompt='請查詢日文聖經（口語訳）'+bookName+' 第'+chapter+'章 第'+v+'節，並進行文法分析。';
      const unit=await analyzeWithGemini(prompt);
      unit.fullTts=unit.chunks.map(c=>c.tts||c.text).join('');
      unit.book=book;unit.chapter=chapter;unit.verse=v;
      localStorage.setItem(ck,JSON.stringify(unit));
      // Upload to Drive
      if(typeof driveUploadVerse==='function')driveUploadVerse(book,chapter,v,unit).catch(e=>console.log('Prefetch Drive:',e.message));
      // Update pills if still on same chapter
      if(curBook===book&&curChapter===chapter)renderVersePills();
      console.log('Prefetch: '+book+' '+chapter+':'+v+' ✓');
    }catch(e){
      if(e.message==='QUOTA'){
        showToast('📥 預載停止（配額用完）');
        console.log('Prefetch: quota hit, stopping');
        break;
      }
      console.log('Prefetch: '+book+' '+chapter+':'+v+' error:',e.message);
      // Non-quota error: skip this verse, continue
    }
    // Wait between calls
    await new Promise(r=>setTimeout(r,PREFETCH_INTERVAL));
  }
  _prefetchActive=false;
  // Summary
  let cached=0;const totalV=vc[chapter-1];
  for(let v=1;v<=totalV;v++){if(localStorage.getItem('bg-'+book+'-'+chapter+'-'+v))cached++;}
  if(curBook===book&&curChapter===chapter){
    if(cached>=totalV)showToast('✅ '+book+' '+chapter+'章 全部預載完成！');
    else showToast('📥 預載完成 ('+cached+'/'+totalV+'節)');
    renderVersePills();
  }
  apiUpdateBadge();
}

function stopPrefetch(){_prefetchAbort=true;}

// Auto-start prefetch when verse loads (debounced)
let _prefetchTimer=null;
function schedulePrefetch(){
  if(_prefetchTimer)clearTimeout(_prefetchTimer);
  // Wait 5 seconds after user settles on a verse, then start prefetching
  _prefetchTimer=setTimeout(()=>{
    if(!_prefetchActive)startPrefetch();
  },5000);
}

// ═══ GOOGLE DRIVE SYNC ENGINE ═══
// OAuth 2.0 Implicit Grant + Google Drive REST API v3
// Storage: per-chapter JSON files (GEN-1.json ... REV-22.json) in app folder
// Merge: per-verse first-come-first-served (never overwrites existing verses)
const DRIVE_CLIENT_ID='644540414434-hp9dh8bdimelfgtgvh0pqrdv6sh5gvm6.apps.googleusercontent.com';
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const DRIVE_REDIRECT=location.origin+location.pathname;
const DRIVE_FOLDER_NAME='japanese-bible-cache';
let _driveToken=null,_driveFolderId=null,_driveSyncing=false;

function driveInit(){
  // 1. Check URL hash for OAuth callback
  const hash=location.hash;
  if(hash.includes('access_token=')){
    const params=new URLSearchParams(hash.slice(1));
    const token=params.get('access_token');
    const expiresIn=parseInt(params.get('expires_in'))||3600;
    if(token){
      _driveToken=token;
      const expiry=Date.now()+expiresIn*1000;
      try{localStorage.setItem('bible-drive-token',token);localStorage.setItem('bible-drive-expiry',expiry+'');}catch(e){}
      // Clean URL hash
      history.replaceState(null,'',location.pathname+location.search);
      showToast('☁️ Google Drive 已連接');
      driveUpdateUI();
      // Auto-sync after login
      setTimeout(()=>driveFullSync(),500);
    }
    return;
  }
  // 2. Check for error in hash
  if(hash.includes('error=')){
    const params=new URLSearchParams(hash.slice(1));
    const err=params.get('error');
    history.replaceState(null,'',location.pathname+location.search);
    if(err==='access_denied')showToast('❌ Google 授權被拒絕');
    else showToast('❌ Google 登入失敗：'+err);
    return;
  }
  // 3. Restore saved token
  try{
    const savedToken=localStorage.getItem('bible-drive-token');
    const savedExpiry=parseInt(localStorage.getItem('bible-drive-expiry')||'0');
    if(savedToken&&savedExpiry>Date.now()+60000){
      _driveToken=savedToken;
      driveUpdateUI();
      // Auto-sync on app load (background, non-blocking)
      setTimeout(()=>driveFullSync(),1500);
    }
  }catch(e){}
}

function driveLogin(){
  const params=new URLSearchParams({
    client_id:DRIVE_CLIENT_ID,
    redirect_uri:DRIVE_REDIRECT,
    response_type:'token',
    scope:DRIVE_SCOPE,
    include_granted_scopes:'true',
    prompt:'consent'
  });
  location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params.toString();
}

function driveLogout(){
  _driveToken=null;_driveFolderId=null;
  try{localStorage.removeItem('bible-drive-token');localStorage.removeItem('bible-drive-expiry');localStorage.removeItem('bible-drive-folder');}catch(e){}
  driveUpdateUI();showToast('🚪 已登出 Google Drive');
}

function driveUpdateUI(){
  const loginBtn=document.getElementById('drive-login-btn');
  const syncBtn=document.getElementById('drive-sync-btn');
  const logoutBtn=document.getElementById('drive-logout-btn');
  const statusEl=document.getElementById('drive-status');
  if(!loginBtn)return;
  if(_driveToken){
    loginBtn.style.display='none';
    syncBtn.disabled=false;
    logoutBtn.style.display='block';
    if(statusEl)statusEl.textContent='✅ 已連接 Google Drive';
  }else{
    loginBtn.style.display='';
    syncBtn.disabled=true;
    logoutBtn.style.display='none';
    if(statusEl)statusEl.textContent='未連接';
  }
}

async function driveFetch(url,opts){
  if(!_driveToken)throw new Error('NOT_LOGGED_IN');
  opts=opts||{};opts.headers=opts.headers||{};
  opts.headers['Authorization']='Bearer '+_driveToken;
  const res=await fetch(url,opts);
  if(res.status===401){
    // Token expired
    _driveToken=null;
    try{localStorage.removeItem('bible-drive-token');}catch(e){}
    driveUpdateUI();
    throw new Error('TOKEN_EXPIRED');
  }
  return res;
}

async function driveGetOrCreateFolder(){
  if(_driveFolderId)return _driveFolderId;
  // Check localStorage cache
  try{const cached=localStorage.getItem('bible-drive-folder');if(cached){_driveFolderId=cached;return cached;}}catch(e){}
  // Search for existing folder
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='"+DRIVE_FOLDER_NAME+"' and trashed=false");
  const res=await driveFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name)&spaces=drive');
  const data=await res.json();
  if(data.files&&data.files.length>0){
    _driveFolderId=data.files[0].id;
    try{localStorage.setItem('bible-drive-folder',_driveFolderId);}catch(e){}
    return _driveFolderId;
  }
  // Create folder
  const createRes=await driveFetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:DRIVE_FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})
  });
  const folder=await createRes.json();
  _driveFolderId=folder.id;
  try{localStorage.setItem('bible-drive-folder',_driveFolderId);}catch(e){}
  return _driveFolderId;
}

async function driveListFiles(){
  const folderId=await driveGetOrCreateFolder();
  let allFiles=[],pageToken='';
  do{
    const url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent("'"+folderId+"' in parents and trashed=false")
      +'&fields=files(id,name)&pageSize=1000'+(pageToken?'&pageToken='+pageToken:'');
    const res=await driveFetch(url);
    const data=await res.json();
    if(data.files)allFiles=allFiles.concat(data.files);
    pageToken=data.nextPageToken||'';
  }while(pageToken);
  return allFiles;// [{id,name}]
}

async function driveDownloadFile(fileId){
  const res=await driveFetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media');
  return await res.json();
}

async function driveUploadFile(fileName,jsonData,existingFileId){
  const folderId=await driveGetOrCreateFolder();
  const metadata={name:fileName};
  if(!existingFileId)metadata.parents=[folderId];
  const body=JSON.stringify(jsonData);
  const boundary='----BibleDrive'+Date.now();
  const multipart='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'
    +JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'
    +body+'\r\n--'+boundary+'--';
  const url=existingFileId
    ?'https://www.googleapis.com/upload/drive/v3/files/'+existingFileId+'?uploadType=multipart'
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const res=await driveFetch(url,{
    method:existingFileId?'PATCH':'POST',
    headers:{'Content-Type':'multipart/related; boundary='+boundary},
    body:multipart
  });
  return await res.json();
}

// Group local bg-* keys by chapter → {book-chapter: {verseNum: data}}
function driveGroupLocalByChapter(){
  const chapters={};
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('bg-'));
  keys.forEach(k=>{
    const parts=k.slice(3).split('-');// [BOOK, CHAPTER, VERSE]
    if(parts.length<3)return;
    const chKey=parts[0]+'-'+parts[1];
    if(!chapters[chKey])chapters[chKey]={};
    try{chapters[chKey][parts[2]]=JSON.parse(localStorage.getItem(k));}catch(e){}
  });
  return chapters;
}

// Full sync: download from Drive what we don't have, upload what Drive doesn't have
async function driveFullSync(){
  if(!_driveToken||_driveSyncing)return;
  _driveSyncing=true;
  const statusEl=document.getElementById('drive-status');
  const syncBtn=document.getElementById('drive-sync-btn');
  if(syncBtn)syncBtn.disabled=true;
  try{
    if(statusEl)statusEl.textContent='☁️ 連線中…';
    const driveFiles=await driveListFiles();
    const driveMap=new Map(driveFiles.map(f=>[f.name,f.id]));// name→id
    const localChapters=driveGroupLocalByChapter();
    let downloaded=0,uploaded=0,merged=0;

    // 1. Download: Drive has, local doesn't (or partial)
    if(statusEl)statusEl.textContent='☁️ 下載中… ('+driveFiles.length+' 章)';
    for(const file of driveFiles){
      const chKey=file.name.replace('.json','');// e.g. GEN-1
      const parts=chKey.split('-');if(parts.length<2)continue;
      const book=parts[0],chapter=parts[1];
      try{
        const driveData=await driveDownloadFile(file.id);
        if(!driveData||typeof driveData!=='object')continue;
        const verses=driveData.verses||driveData;
        let newVerses=0;
        Object.keys(verses).forEach(vNum=>{
          const lsKey='bg-'+book+'-'+chapter+'-'+vNum;
          if(!localStorage.getItem(lsKey)){
            try{localStorage.setItem(lsKey,typeof verses[vNum]==='string'?verses[vNum]:JSON.stringify(verses[vNum]));newVerses++;}catch(e){}
          }
        });
        if(newVerses>0)downloaded+=newVerses;
      }catch(e){console.log('Drive download error:',chKey,e.message);}
    }

    // 2. Upload: local has, Drive doesn't (or local has more verses)
    if(statusEl)statusEl.textContent='☁️ 上傳中…';
    const localKeys=Object.keys(localChapters);
    for(const chKey of localKeys){
      const fileName=chKey+'.json';
      const localVerses=localChapters[chKey];
      const existingId=driveMap.get(fileName);
      if(existingId){
        // Merge: download, add missing verses, re-upload
        try{
          const driveData=await driveDownloadFile(existingId);
          const driveVerses=(driveData&&driveData.verses)||driveData||{};
          let hasNew=false;
          Object.keys(localVerses).forEach(vNum=>{
            if(!driveVerses[vNum]){driveVerses[vNum]=localVerses[vNum];hasNew=true;}
          });
          if(hasNew){
            await driveUploadFile(fileName,{version:2,updatedAt:new Date().toISOString(),verses:driveVerses},existingId);
            merged++;
          }
        }catch(e){console.log('Drive merge error:',chKey,e.message);}
      }else{
        // New file
        try{
          await driveUploadFile(fileName,{version:2,updatedAt:new Date().toISOString(),verses:localVerses});
          uploaded++;
        }catch(e){console.log('Drive upload error:',chKey,e.message);}
      }
    }

    const msg=[];
    if(downloaded)msg.push('⬇️'+downloaded+'節');
    if(uploaded)msg.push('⬆️'+uploaded+'章');
    if(merged)msg.push('🔄'+merged+'章合併');
    if(msg.length)showToast('☁️ 同步完成：'+msg.join(' '));
    else showToast('☁️ 雲端已是最新');
    if(statusEl)statusEl.textContent='✅ 已同步（'+driveFiles.length+'章在雲端）';
    if(downloaded)renderVersePills();// refresh green borders
  }catch(e){
    const msg=e.message||'';
    if(msg==='TOKEN_EXPIRED')showToast('🔑 登入已過期，請重新登入');
    else if(msg==='NOT_LOGGED_IN')showToast('請先登入 Google Drive');
    else showToast('☁️ 同步失敗：'+msg.slice(0,30));
    if(statusEl)statusEl.textContent='❌ 同步失敗';
  }finally{
    _driveSyncing=false;
    if(syncBtn)syncBtn.disabled=false;
  }
}

// Upload a single verse to Drive (called after Gemini returns new data)
async function driveUploadVerse(book,chapter,verse,unitData){
  if(!_driveToken)return;// silently skip if not logged in
  const chKey=book+'-'+chapter;
  const fileName=chKey+'.json';
  try{
    const folderId=await driveGetOrCreateFolder();
    // Find existing file
    const q=encodeURIComponent("name='"+fileName+"' and '"+folderId+"' in parents and trashed=false");
    const res=await driveFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)');
    const data=await res.json();
    const existingId=(data.files&&data.files[0])?data.files[0].id:null;
    if(existingId){
      // Download, merge, re-upload
      const driveData=await driveDownloadFile(existingId);
      const driveVerses=(driveData&&driveData.verses)||driveData||{};
      if(!driveVerses[verse+''])driveVerses[verse+'']=unitData;// first-come-first-served
      await driveUploadFile(fileName,{version:2,updatedAt:new Date().toISOString(),verses:driveVerses},existingId);
    }else{
      // Create new
      const verses={};verses[verse+'']=unitData;
      await driveUploadFile(fileName,{version:2,updatedAt:new Date().toISOString(),verses:verses});
    }
  }catch(e){console.log('driveUploadVerse:',e.message);}
}
